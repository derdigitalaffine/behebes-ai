map $http_x_forwarded_proto $proxy_forwarded_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
}

map $http_x_forwarded_host $proxy_forwarded_host {
    default $http_x_forwarded_host;
    '' $http_host;
}

upstream backend_upstream {
    server backend:3001;
    keepalive 32;
}

upstream citizen_frontend_upstream {
    server frontend:80;
    keepalive 16;
}

upstream admin_frontend_upstream {
    server admin:80;
    keepalive 16;
}

upstream ops_frontend_upstream {
    server ops:80;
    keepalive 16;
}

server {
    listen 80;
    server_name www.behebes.de behebes.de _;

    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    client_max_body_size 150M;
    proxy_read_timeout 180s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 180s;

    # API -> Backend
    location = /api {
        proxy_pass http://backend_upstream/api;
    }

    # SSE stream for admin realtime updates
    location ^~ /api/admin/realtime/stream {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering "no" always;
    }

    location ^~ /api/ {
        proxy_pass http://backend_upstream;
    }

    # XMPP over WebSocket (xmpp.js clients)
    location ^~ /xmpp-websocket {
        proxy_pass http://xmpp:5280/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Optional BOSH endpoint fallback
    location ^~ /xmpp-bosh {
        proxy_pass http://xmpp:5280/bosh;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Legacy citizen callback roots -> canonical tenant-aware path
    location = /verify {
        return 302 /api/config/public/legacy-redirect?legacyPath=/verify&$query_string;
    }

    location = /status {
        return 302 /api/config/public/legacy-redirect?legacyPath=/status&$query_string;
    }

    location = /workflow/confirm {
        return 302 /api/config/public/legacy-redirect?legacyPath=/workflow/confirm&$query_string;
    }

    location = /workflow/data-request {
        return 302 /api/config/public/legacy-redirect?legacyPath=/workflow/data-request&$query_string;
    }

    # Admin SPA (without external redirect)
    location = /admin {
        proxy_pass http://admin_frontend_upstream/;
    }

    # Strip /admin prefix for admin assets/routes
    location ^~ /admin/ {
        proxy_pass http://admin_frontend_upstream/;
    }

    # Ops SPA (mobile-first staff frontend)
    location = /ops {
        proxy_pass http://ops_frontend_upstream/;
    }

    location ^~ /ops/ {
        proxy_pass http://ops_frontend_upstream/;
    }

    # Citizen frontend at root
    location / {
        proxy_pass http://citizen_frontend_upstream;
    }

    # Proxy health endpoint
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
