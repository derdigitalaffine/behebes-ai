server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    etag on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types
      text/plain
      text/css
      application/javascript
      application/json
      application/xml
      image/svg+xml
      application/font-woff
      application/font-woff2
      font/woff
      font/woff2;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|mjs|css|map|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }
}
