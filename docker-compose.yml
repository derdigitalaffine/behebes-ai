version: "3.9"

services:
  mysql:
    image: docker.io/library/mysql:8.4
    command: --skip-log-bin
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-behebes_ai}
      MYSQL_USER: ${MYSQL_USER:-behebes}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-behebes}
    volumes:
      - mysql_data:/var/lib/mysql
    expose:
      - "3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
        APP_BUILD_ID: ${APP_BUILD_ID:-local-dev}
        APP_BUILD_TIME: ${APP_BUILD_TIME:-1970-01-01T00:00:00.000Z}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      EXPRESS_PORT: 3001
      DATABASE_CLIENT: ${DATABASE_CLIENT:-mysql}
      DATABASE_PATH: /app/data/oi_app.db
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-behebes}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-behebes}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-behebes_ai}
      MYSQL_MIGRATE_FROM_SQLITE: ${MYSQL_MIGRATE_FROM_SQLITE:-true}
      MYSQL_MIGRATION_SQLITE_PATH: /app/data/oi_app.db
      MYSQL_CONNECTION_RETRIES: ${MYSQL_CONNECTION_RETRIES:-60}
      MYSQL_CONNECTION_RETRY_DELAY_MS: ${MYSQL_CONNECTION_RETRY_DELAY_MS:-2000}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      FRONTEND_URL: ${FRONTEND_URL:-https://www.behebes.de}
      ADMIN_URL: ${ADMIN_URL:-https://www.behebes.de/admin}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://www.behebes.de,https://behebes.de}
      OPENAI_CLIENT_ID: ${OPENAI_CLIENT_ID:-}
      OPENAI_CLIENT_SECRET: ${OPENAI_CLIENT_SECRET:-}
      OPENAI_REDIRECT_URI: ${OPENAI_REDIRECT_URI:-https://www.behebes.de/api/auth/openai/callback}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@example.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-OI App}
      EXPRESS_TRUST_PROXY: ${EXPRESS_TRUST_PROXY:-1}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-1500}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-600000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-30}
      XMPP_ENABLED: ${XMPP_ENABLED:-true}
      XMPP_DOMAIN: ${XMPP_DOMAIN:-localhost}
      XMPP_MUC_SERVICE: ${XMPP_MUC_SERVICE:-conference.localhost}
      XMPP_WEBSOCKET_URL: ${XMPP_WEBSOCKET_URL:-/xmpp-websocket}
      XMPP_API_URL: ${XMPP_API_URL:-http://xmpp:5280/api}
      XMPP_API_USER: ${XMPP_API_USER:-xmppadmin@localhost}
      XMPP_API_PASSWORD: ${XMPP_API_PASSWORD:-xmppadmin-change-me}
      XMPP_EMAIL_NOTIFICATIONS_DEFAULT: ${XMPP_EMAIL_NOTIFICATIONS_DEFAULT:-true}
    volumes:
      - ./backend/data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      xmpp:
        condition: service_started
    labels:
      autoheal: "false"
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        APP_VERSION: ${APP_VERSION:-1.0.0}
        APP_BUILD_ID: ${APP_BUILD_ID:-local-dev}
        APP_BUILD_TIME: ${APP_BUILD_TIME:-1970-01-01T00:00:00.000Z}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    expose:
      - "80"
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        APP_VERSION: ${APP_VERSION:-1.0.0}
        APP_BUILD_ID: ${APP_BUILD_ID:-local-dev}
        APP_BUILD_TIME: ${APP_BUILD_TIME:-1970-01-01T00:00:00.000Z}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    expose:
      - "80"
    restart: unless-stopped

  ops:
    build:
      context: ./ops
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        APP_VERSION: ${APP_VERSION:-1.0.0}
        APP_BUILD_ID: ${APP_BUILD_ID:-local-dev}
        APP_BUILD_TIME: ${APP_BUILD_TIME:-1970-01-01T00:00:00.000Z}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    expose:
      - "80"
    restart: unless-stopped

  xmpp:
    image: ghcr.io/processone/ejabberd:24.12
    environment:
      EJABBERD_MACRO_HOST: ${XMPP_DOMAIN:-localhost}
      EJABBERD_MACRO_ADMIN: ${XMPP_API_USER:-xmppadmin@localhost}
      REGISTER_ADMIN_PASSWORD: ${XMPP_API_PASSWORD:-xmppadmin-change-me}
    volumes:
      - ./xmpp/ejabberd.yml:/opt/ejabberd/conf/ejabberd.yml:ro
    expose:
      - "5222"
      - "5280"
    restart: unless-stopped

  proxy:
    image: docker.io/library/nginx:1.27-alpine
    ports:
      - "${PROXY_PORT:-8384}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      admin:
        condition: service_started
      ops:
        condition: service_started
      xmpp:
        condition: service_started
    restart: unless-stopped

  autoheal:
    image: docker.io/willfarrell/autoheal:latest
    profiles:
      - autoheal
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 15
      AUTOHEAL_START_PERIOD: 60
    volumes:
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    restart: unless-stopped

volumes:
  mysql_data:
